<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Signets Sync</title>
    <style>
      body {
        font-family: system-ui, sans-serif;
        margin: 0;
        padding: 16px;
        width: 280px;
        background: #09090b;
        color: #f4f4f5;
      }
      label {
        display: grid;
        gap: 6px;
        margin-bottom: 12px;
        font-size: 12px;
        color: #a1a1aa;
      }
      input {
        border: 1px solid #3f3f46;
        border-radius: 8px;
        background: #18181b;
        color: inherit;
        padding: 8px 10px;
      }
      button {
        width: 100%;
        border: 0;
        border-radius: 8px;
        background: #fafafa;
        color: #18181b;
        font-weight: 600;
        padding: 10px 12px;
        cursor: pointer;
      }
      #status {
        margin-top: 12px;
        font-size: 12px;
        color: #a1a1aa;
        min-height: 2.5em;
      }
    </style>
  </head>
  <body>
    <label>
      API URL
      <input id="apiUrl" value="http://localhost:3001" />
    </label>
    <label>
      Sync token
      <input id="syncToken" type="password" placeholder="Bearer token" />
    </label>
    <button id="save">Save settings</button>
    <button id="sync" style="margin-top: 8px">Sync captured shots</button>
    <p id="status"></p>
    <script type="module" src="popup.js"></script>
  </body>
</html>
